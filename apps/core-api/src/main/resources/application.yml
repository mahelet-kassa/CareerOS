spring:
  application:
    name: core-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/careeros}
    username: ${DATABASE_USER:careeros}
    password: ${DATABASE_PASSWORD:careeros}
  jpa:
    hibernate:
      ddl-auto: validate # schema is owned by Flyway, never by Hibernate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # JWKS is resolved lazily on the first bearer-token request, so the app
          # boots fine before a real OIDC provider (Cognito/Auth0) is configured.
          issuer-uri: ${OIDC_ISSUER_URI:https://oidc-not-configured.invalid}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true # /actuator/health/liveness + /readiness for ECS/ALB checks
