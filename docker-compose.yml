services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: careeros
      POSTGRES_USER: careeros
      POSTGRES_PASSWORD: careeros # local only — never reuse in deployed envs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros -d careeros"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
