name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"

permissions:
  contents: read

# One concurrent deploy; don't cancel an in-progress prod deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install
        run: pip install -r requirements-docs.txt
      # --strict fails the build on broken internal links, so docs can't rot silently.
      - name: Build site
        run: mkdocs build --strict

  deploy:
    # Only publish from main; PRs just build to validate.
    # Publishes to the gh-pages branch, which is what GitHub Pages serves.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install
        run: pip install -r requirements-docs.txt
      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898026+github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force
