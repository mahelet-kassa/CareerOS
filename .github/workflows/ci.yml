name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/core-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      # Pin Gradle: no wrapper is committed yet, and the runner's preinstalled
      # Gradle (9.x) is incompatible with the Spring Boot 3.3.x plugin.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      # Testcontainers uses the runner's Docker daemon for the pgvector container
      - name: Build and test
        run: gradle build

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm install # switch to `npm ci` after the first lockfile commit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
